services:
  postgres:
    image: postgres:16
    container_name: bot_postgres_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: bot_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_web_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      USE_POSTGRES: "True"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: >
      sh -c "python app/manage.py migrate &&
      python app/manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --chdir app --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3}"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_worker_prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      USE_POSTGRES: "True"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: sh -c "cd app && celery -A config worker -l info"
    volumes:
      - media_volume:/app/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_beat_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      USE_POSTGRES: "True"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: sh -c "cd app && celery -A config beat -l info"
    volumes:
      - media_volume:/app/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_app_prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      USE_POSTGRES: "True"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    command: python app/bot/bot.py
    volumes:
      - media_volume:/app/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: bot_nginx_prod
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     - static_volume:/app/staticfiles:ro
  #     - media_volume:/app/app/media:ro
  #   depends_on:
  #     - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
